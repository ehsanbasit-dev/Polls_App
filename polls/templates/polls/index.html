<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polls App - Index</title>
</head>
<body>
<h1>All Polls Questions</h1>
   
<ul>
    {% for question in latest_question_list %}
       <li>
           <a href="/polls/{{ question.id }}">
               {{question.question_txt}}
           </a>
       </li>
    {% endfor %}
</ul>
</body>
</html>
