<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polls Results</title>
</head>
<body>
<h1>{{ question.question_txt }}</h1>    

<ul>
{% for choice in question.choice_set.all %}
<li>
{{  choice.choice_txt }} -- {{ choice.votes }} votes 
</li>
{% endfor %}    
</ul>

<a href="/polls/{{ question.id }}/">Vote again</a>

</body>
</html>
